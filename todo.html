<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --primary-dark: #3730a3;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-section {
            padding: 20px;
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-100);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .filters {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .todo-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .todo-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: var(--gray-50);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--gray-400);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            min-width: 24px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-text {
            font-size: 1rem;
            color: var(--gray-900);
            word-break: break-word;
            margin-bottom: 4px;
        }

        .todo-meta {
            font-size: 0.75rem;
            color: var(--gray-400);
            display: flex;
            gap: 12px;
        }

        .priority-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .priority-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .priority-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .priority-low {
            background: #dbeafe;
            color: #1e40af;
        }

        .todo-date {
            font-size: 0.75rem;
            color: var(--gray-400);
        }

        .todo-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .todo-item:hover .todo-actions {
            opacity: 1;
        }

        .btn-delete,
        .btn-edit {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-delete {
            background: #fee2e2;
            color: var(--danger);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: #dbeafe;
            color: var(--primary);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: white;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
            color: var(--gray-400);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 0.95rem;
            color: var(--gray-500);
        }

        footer {
            padding: 15px 20px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
            text-align: center;
            font-size: 0.85rem;
            color: var(--gray-500);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-clear-all {
            padding: 6px 12px;
            background: #fee2e2;
            color: var(--danger);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-clear-all:hover {
            background: var(--danger);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gray-900);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn-cancel {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .btn-cancel:hover {
            background: var(--gray-300);
        }

        .no-tasks {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
        }

        .no-tasks svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 15px;
                max-height: 100vh;
            }

            header {
                padding: 20px 15px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .stats {
                font-size: 0.85rem;
            }

            .stat-number {
                font-size: 1.2rem;
            }

            .input-section,
            .filters {
                padding: 15px;
            }

            .todo-item {
                padding: 12px 15px;
                gap: 10px;
            }

            .todo-actions {
                gap: 4px;
            }

            .btn-delete,
            .btn-edit {
                padding: 4px 8px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Smart To-Do List</h1>
            <p>Stay organized and productive</p>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="total-count">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="completed-count">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="pending-count">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="btn-add" onclick="openAddModal()">
                    <span>➕</span>
                    <span>Add</span>
                </button>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTodos('all', this)">All</button>
            <button class="filter-btn" onclick="filterTodos('active', this)">Active</button>
            <button class="filter-btn" onclick="filterTodos('completed', this)">Completed</button>
            <button class="filter-btn" onclick="filterTodos('high', this)">🔴 High</button>
            <button class="filter-btn" onclick="filterTodos('medium', this)">🟡 Medium</button>
            <button class="filter-btn" onclick="filterTodos('low', this)">🔵 Low</button>
        </div>

        <div class="todo-list" id="todo-list">
            <div class="no-tasks">
                <div style="font-size: 3rem;">📝</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <footer>
            <span id="footer-text">0 tasks</span>
            <button class="btn-clear-all" onclick="clearCompleted()">Clear Completed</button>
        </footer>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Add New Task</div>
            <form id="task-form" onsubmit="saveTask(event)">
                <div class="form-group">
                    <label for="task-title">Task Title *</label>
                    <input 
                        type="text" 
                        id="task-title" 
                        placeholder="Enter task title"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea 
                        id="task-description" 
                        placeholder="Add more details (optional)"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-date">Due Date</label>
                    <input type="date" id="task-date">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save">Save Task</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Local Storage Management
        const STORAGE_KEY = 'todos';
        let todos = [];
        let currentFilter = 'all';
        let editingId = null;

        // Initialize app
        function init() {
            loadFromStorage();
            renderTodos();
            updateStats();
            setupEventListeners();
        }

        // Event Listeners
        function setupEventListeners() {
            const input = document.getElementById('todo-input');
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = input.value.trim();
                    if (text) {
                        addQuickTask(text);
                        input.value = '';
                    }
                }
            });

            // Close modal on outside click
            document.getElementById('task-modal').addEventListener('click', (e) => {
                if (e.target.id === 'task-modal') {
                    closeModal();
                }
            });
        }

        // Load from Local Storage
        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            todos = stored ? JSON.parse(stored) : [];
        }

        // Save to Local Storage
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        }

        // Add Quick Task (from input)
        function addQuickTask(text) {
            const task = {
                id: Date.now(),
                title: text,
                description: '',
                completed: false,
                priority: 'medium',
                dueDate: '',
                createdAt: new Date().toISOString()
            };
            todos.unshift(task);
            saveToStorage();
            renderTodos();
            updateStats();
        }

        // Open Add Modal
        function openAddModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add New Task';
            document.getElementById('task-form').reset();
            document.getElementById('task-date').value = '';
            document.getElementById('task-priority').value = 'medium';
            document.getElementById('task-modal').classList.add('active');
            document.getElementById('task-title').focus();
        }

        // Open Edit Modal
        function openEditModal(id) {
            const task = todos.find(t => t.id === id);
            if (!task) return;

            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Task';
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-description').value = task.description;
            document.getElementById('task-priority').value = task.priority;
            document.getElementById('task-date').value = task.dueDate;
            document.getElementById('task-modal').classList.add('active');
            document.getElementById('task-title').focus();
        }

        // Close Modal
        function closeModal() {
            document.getElementById('task-modal').classList.remove('active');
            editingId = null;
        }

        // Save Task
        function saveTask(e) {
            e.preventDefault();
            
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-description').value.trim();
            const priority = document.getElementById('task-priority').value;
            const dueDate = document.getElementById('task-date').value;

            if (!title) {
                alert('Please enter a task title');
                return;
            }

            if (editingId) {
                // Edit existing task
                const task = todos.find(t => t.id === editingId);
                if (task) {
                    task.title = title;
                    task.description = description;
                    task.priority = priority;
                    task.dueDate = dueDate;
                }
            } else {
                // Add new task
                const task = {
                    id: Date.now(),
                    title,
                    description,
                    completed: false,
                    priority,
                    dueDate,
                    createdAt: new Date().toISOString()
                };
                todos.unshift(task);
            }

            saveToStorage();
            renderTodos();
            updateStats();
            closeModal();
        }

        // Toggle Task Completion
        function toggleTask(id) {
            const task = todos.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveToStorage();
                renderTodos();
                updateStats();
            }
        }

        // Delete Task
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                todos = todos.filter(t => t.id !== id);
                saveToStorage();
                renderTodos();
                updateStats();
            }
        }

        // Clear Completed Tasks
        function clearCompleted() {
            const completed = todos.filter(t => t.completed).length;
            if (completed === 0) {
                alert('No completed tasks to clear');
                return;
            }
            if (confirm(`Delete ${completed} completed task(s)?`)) {
                todos = todos.filter(t => !t.completed);
                saveToStorage();
                renderTodos();
                updateStats();
            }
        }

        // Filter Todos
        function filterTodos(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderTodos();
        }

        // Get Filtered Todos
        function getFilteredTodos() {
            switch (currentFilter) {
                case 'active':
                    return todos.filter(t => !t.completed);
                case 'completed':
                    return todos.filter(t => t.completed);
                case 'high':
                    return todos.filter(t => t.priority === 'high');
                case 'medium':
                    return todos.filter(t => t.priority === 'medium');
                case 'low':
                    return todos.filter(t => t.priority === 'low');
                default:
                    return todos;
            }
        }

        // Format Date
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const dateOnly = d => d.toDateString();
            
            if (dateOnly(date) === dateOnly(today)) {
                return 'Today';
            } else if (dateOnly(date) === dateOnly(tomorrow)) {
                return 'Tomorrow';
            } else {
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        }

        // Render Todos
        function renderTodos() {
            const todoList = document.getElementById('todo-list');
            const filtered = getFilteredTodos();

            if (filtered.length === 0) {
                todoList.innerHTML = `
                    <div class="no-tasks">
                        <div style="font-size: 3rem;">📭</div>
                        <p>No tasks here. ${currentFilter === 'all' ? 'Add one to get started!' : 'Try a different filter!'}</p>
                    </div>
                `;
                return;
            }

            todoList.innerHTML = filtered.map(task => `
                <div class="todo-item ${task.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    >
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(task.title)}</div>
                        <div class="todo-meta">
                            <span class="priority-badge priority-${task.priority}">
                                ${task.priority}
                            </span>
                            ${task.dueDate ? `<span class="todo-date">📅 ${formatDate(task.dueDate)}</span>` : ''}
                        </div>
                    </div>
                    <div class="todo-actions">
                        <button class="btn-edit" onclick="openEditModal(${task.id})">Edit</button>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Update Statistics
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('total-count').textContent = total;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('footer-text').textContent = `${pending} active ${pending === 1 ? 'task' : 'tasks'}`;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on page load
        window.addEventListener('load', init);

        // Optional: Save to storage when page is about to close
        window.addEventListener('beforeunload', () => {
            saveToStorage();
        });
    </script>
</body>
</html>
